<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Join Pulse - Create your account and start sharing your music journey with passionate music lovers."
    />
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/tailwind.output.css" />
    <script type="module" src="../js/modules/formValidation.js"></script>
    <title>Register</title>
  </head>
  <body>
    <header class="flex justify-center py-[30px] px-5">
      <img src="../assets/pulse.svg" alt="Pulse" class="h-[30px] w-auto" />
    </header>
    <main>
      <div class="max-w-[400px] mx-auto p-5">
        <h1 class="text-center mb-[30px] text-[28px]">Create Account</h1>
        <form id="registerForm" class="flex flex-col gap-5">
          <div class="flex flex-col gap-2">
            <label for="name" class="text-sm font-medium">Username</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Enter your username"
              class="p-3 text-base bg-[#3a3b3c] border border-solid border-[#3a3b3c] rounded-lg text-white focus:outline-none focus:border-white"
              required
            />
          </div>

          <div class="flex flex-col gap-2">
            <label for="email" class="text-sm font-medium">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              class="p-3 text-base bg-[#3a3b3c] border border-solid border-[#3a3b3c] rounded-lg text-white focus:outline-none focus:border-white"
              required
            />
          </div>

          <div class="flex flex-col gap-2">
            <label for="password" class="text-sm font-medium">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              class="p-3 text-base bg-[#3a3b3c] border border-solid border-[#3a3b3c] rounded-lg text-white focus:outline-none focus:border-white"
              required
            />
          </div>

          <div class="flex flex-col gap-2">
            <label for="avatar" class="text-sm font-medium"
              >Avatar URL (optional)</label
            >
            <input
              type="url"
              id="avatar"
              name="avatar"
              placeholder="Enter avatar image URL"
              class="p-3 text-base bg-[#3a3b3c] border border-solid border-[#3a3b3c] rounded-lg text-white focus:outline-none focus:border-white"
            />
          </div>

          <button
            type="submit"
            class="bg-[#1c1e21] text-white border border-solid border-[#3a3b3c] py-[10px] px-5 rounded cursor-pointer text-sm w-full hover:border-2 hover:border-white transition-colors"
          >
            Register
          </button>
        </form>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
