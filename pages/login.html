<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Log in to Pulse - Access your music profile and share your favorite songs with the community."
    />
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/tailwind.output.css" />
    <script type="module" src="../js/modules/formValidation.js"></script>
    <title>Login</title>
  </head>
  <body>
    <header class="flex justify-center px-5 py-[30px]">
      <img src="../assets/pulse.svg" alt="Pulse" class="h-[30px] w-auto" />
    </header>
    <main>
      <div class="mx-auto max-w-[400px] p-5">
        <h1 class="mb-[30px] text-center text-[28px]">Login</h1>
        <form id="loginForm" class="flex flex-col gap-5" novalidate>
          <div class="flex flex-col gap-2">
            <label for="email" class="text-sm font-medium">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              class="rounded-lg border border-solid border-[#3a3b3c] bg-[#3a3b3c] p-3 text-base text-white focus:border-white focus:outline-none"
              required
            />
          </div>

          <div class="flex flex-col gap-2">
            <label for="password" class="text-sm font-medium">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              class="rounded-lg border border-solid border-[#3a3b3c] bg-[#3a3b3c] p-3 text-base text-white focus:border-white focus:outline-none"
              required
            />
          </div>

          <button
            type="submit"
            class="w-full cursor-pointer rounded border border-solid border-[#3a3b3c] bg-[#1c1e21] px-5 py-[10px] text-sm text-white transition-colors hover:border-2 hover:border-white"
          >
            Login
          </button>
        </form>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
