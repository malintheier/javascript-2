<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="View music post on Pulse - Read about songs, albums, and musical experiences shared by the community."
    />
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/forms.css" />
    <link rel="stylesheet" href="../css/tailwind.output.css" />
    <script type="module" src="../js/utils/authGuard.js"></script>
    <script type="module" src="../js/modules/renderPostCard.js"></script>
    <script type="module" src="../js/main.js"></script>
    <title>Post</title>
  </head>
  <body>
    <header
      class="fixed top-0 left-0 right-0 h-[60px] bg-[#1c1e21] flex justify-between items-center px-5 z-[100] lg:hidden"
    >
      <button
        id="mobileCreateBtn"
        class="bg-transparent border-none cursor-pointer"
      >
        <img src="../assets/add.svg" alt="Create" class="w-[30px] h-[30px]" />
      </button>
      <img src="../assets/pulse.svg" alt="Pulse" class="h-[30px] w-auto" />
      <button
        id="mobileLogoutBtn"
        class="bg-transparent border-none cursor-pointer"
      >
        <img
          src="../assets/sign-out.svg"
          alt="Logout"
          class="w-[30px] h-[30px]"
        />
      </button>
    </header>

    <nav
      class="fixed bottom-0 left-0 right-0 h-[60px] bg-[#1c1e21] [border-top:1px_solid_#3a3b3c] flex justify-between items-center px-5 z-[100] lg:hidden"
    >
      <a
        href="feed.html"
        class="flex items-center justify-center no-underline text-inherit"
      >
        <img src="../assets/home.svg" alt="Home" class="w-[30px] h-[30px]" />
      </a>
      <button
        id="mobileSearchBtn"
        class="bg-transparent border-none cursor-pointer flex items-center justify-center"
      >
        <img
          src="../assets/search.svg"
          alt="Search"
          class="w-[30px] h-[30px]"
        />
      </button>
      <a
        href="profile.html"
        class="flex items-center justify-center no-underline text-inherit"
      >
        <img
          src=""
          alt="Profile"
          class="mobile-profile-avatar w-[30px] h-[30px] rounded-full object-cover"
        />
      </a>
    </nav>

    <div
      id="mobileSearchOverlay"
      class="mobile-search-overlay fixed top-full left-0 right-0 bottom-0 bg-[#1c1e21] z-[200] transition-[top] duration-300 ease-in-out flex flex-col"
    >
      <div class="px-5 h-[60px] [border-bottom:1px_solid_#3a3b3c] flex">
        <button
          id="mobileSearchClose"
          class="bg-transparent border-none cursor-pointer"
        >
          <img
            src="../assets/close.svg"
            alt="Close"
            class="w-[30px] h-[30px]"
          />
        </button>
      </div>
      <div class="p-5 flex-1 overflow-y-auto">
        <input
          type="search"
          id="mobileSearchInput"
          placeholder="Search..."
          class="w-full p-3 text-base bg-[#3a3b3c] border border-solid border-[#3a3b3c] rounded-lg mb-[15px] text-white"
        />
        <div id="mobileSearchResults" class="mt-5"></div>
      </div>
    </div>

    <div
      id="mobileCreateOverlay"
      class="mobile-create-overlay fixed top-0 -left-full w-full h-full bg-[#1c1e21] z-[200] transition-[left] duration-300 ease-in-out flex flex-col"
    >
      <div
        class="h-[60px] px-5 [border-bottom:1px_solid_#3a3b3c] flex items-center gap-[15px]"
      >
        <button
          id="mobileCreateClose"
          class="bg-transparent border-none cursor-pointer"
        >
          <img
            src="../assets/close.svg"
            alt="Close"
            class="w-[30px] h-[30px]"
          />
        </button>
        <h2 class="text-[20px] font-semibold m-0 text-white uppercase">
          New post
        </h2>
      </div>
      <div class="p-5 flex-1 overflow-y-auto">
        <form id="mobileCreateForm" class="flex flex-col gap-[15px] text-white">
          <input
            type="text"
            id="mobilePostSong"
            placeholder="Song"
            class="w-full p-3 text-base border border-solid border-[#3a3b3c] rounded-lg font-[inherit] bg-[#1c1e21] text-white"
          />
          <input
            type="text"
            id="mobilePostArtist"
            placeholder="Artist"
            class="w-full p-3 text-base border border-solid border-[#3a3b3c] rounded-lg font-[inherit] bg-[#1c1e21] text-white"
          />
          <input
            type="text"
            id="mobilePostTitle"
            placeholder="Title"
            class="w-full p-3 text-base border border-solid border-[#3a3b3c] rounded-lg font-[inherit] bg-[#1c1e21] text-white"
          />
          <textarea
            id="mobilePostBody"
            placeholder="What's on your mind?"
            class="w-full p-3 text-base border border-solid border-[#3a3b3c] rounded-lg font-[inherit] bg-[#1c1e21] text-white min-h-[200px] resize-y"
          ></textarea>
          <input
            type="url"
            id="mobilePostImageUrl"
            placeholder="Album cover URL (optional)"
            class="w-full p-3 text-base border border-solid border-[#3a3b3c] rounded-lg font-[inherit] bg-[#1c1e21] text-white"
          />
          <input
            type="text"
            id="mobilePostImageAlt"
            placeholder="Image alt text (optional)"
            class="w-full p-3 text-base border border-solid border-[#3a3b3c] rounded-lg font-[inherit] bg-[#1c1e21] text-white"
          />
          <button
            type="submit"
            class="bg-[#3a3b3c] text-white border-none p-3 text-base font-semibold rounded-lg cursor-pointer"
          >
            Post
          </button>
        </form>
      </div>
    </div>

    <div
      id="mobileLogoutOverlay"
      class="mobile-logout-overlay fixed inset-0 bg-black/50 z-[200] hidden items-center justify-center"
    >
      <div
        class="bg-[#1c1e21] p-[30px] rounded-xl max-w-[300px] w-[90%] text-center text-white"
      >
        <p class="mb-5 text-base text-white">
          Are you sure you want to log out?
        </p>
        <a
          href="../index.html"
          class="block bg-[#f44336] text-white p-3 rounded-lg no-underline mb-[10px] font-semibold text-base text-center"
          >Yes, log out</a
        >
        <button
          id="mobileLogoutCancel"
          class="bg-[#3a3b3c] border-none p-3 rounded-lg w-full cursor-pointer text-base text-white"
        >
          Cancel
        </button>
      </div>
    </div>

    <header
      class="desktop-header hidden lg:block lg:fixed lg:top-0 lg:left-0 lg:bottom-0 lg:w-[100px] lg:bg-[#1c1e21] lg:z-[100] lg:transition-[width] lg:duration-300 lg:ease-in-out"
    >
      <nav class="sidebar lg:h-full lg:py-5">
        <ul class="lg:flex lg:flex-col lg:gap-[10px] lg:h-full">
          <li class="sidebar-logo lg:px-5 lg:mb-[30px]">
            <img
              src="../assets/logo.png"
              alt="Pulse Logo"
              class="lg:w-[70px] lg:h-auto"
            />
          </li>
          <li class="lg:px-5">
            <a href="feed.html">
              <img
                src="../assets/home.svg"
                alt="Home Icon"
                class="desktop-icon w-[30px] h-[30px]"
              />
            </a>
          </li>
          <li class="lg:px-5">
            <button id="desktopSearchBtn" class="desktop-btn">
              <img
                src="../assets/search.svg"
                alt="Search icon"
                class="desktop-icon w-[30px] h-[30px]"
              />
            </button>
          </li>
          <li class="desktop-search-container lg:px-5 hidden">
            <input
              type="search"
              id="desktopSearchInput"
              placeholder="Search..."
              class="w-full p-3 bg-[#3a3b3c] border border-solid border-[#3a3b3c] rounded-lg text-white text-sm focus:outline-none focus:border-white"
            />
            <div
              id="desktopSearchResults"
              class="max-h-[400px] overflow-y-auto"
            ></div>
          </li>
          <li class="lg:px-5">
            <button id="desktopCreateBtn" class="desktop-btn">
              <img
                src="../assets/add.svg"
                alt="Create icon"
                class="desktop-icon w-[30px] h-[30px]"
              />
            </button>
          </li>
          <li class="lg:px-5">
            <a href="profile.html">
              <img
                src=""
                alt="Profile Icon"
                class="desktop-icon w-[30px] h-[30px]"
              />
            </a>
          </li>
          <li class="lg:px-5">
            <button id="desktopLogoutBtn" class="desktop-btn">
              <img
                src="../assets/sign-out.svg"
                alt="Logout icon"
                class="desktop-icon w-[30px] h-[30px]"
              />
            </button>
          </li>
        </ul>
      </nav>
    </header>

    <div
      class="main-wrapper pt-[70px] px-5 pb-5 lg:ml-[100px] lg:p-10 lg:flex lg:justify-center lg:transition-[margin-left] lg:duration-300 lg:ease-in-out"
    >
      <main>
        <div id="postContainer"></div>
      </main>
    </div>
    <footer></footer>
  </body>
</html>
